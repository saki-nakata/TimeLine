name: E2E Tests

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - 'e2e/**'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - 'e2e/**'

jobs:
  e2e:
    name: Playwright E2E (Chromium)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: timeline
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: temurin

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('backend/**/*.gradle*', 'backend/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --ignore-scripts

      - name: Install e2e dependencies
        working-directory: e2e
        run: pnpm install

      - name: Install Playwright browsers
        working-directory: e2e
        run: pnpm exec playwright install --with-deps chromium

      - name: Grant execute permission to gradlew
        working-directory: backend
        run: chmod +x gradlew

      - name: Build backend JAR
        working-directory: backend
        run: ./gradlew bootJar -x test

      - name: Start backend
        working-directory: backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: timeline
          DB_USER: postgres
          DB_PASSWORD: postgres
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'change-this-secret-in-production-must-be-at-least-32-chars' }}
          AWS_ACCESS_KEY_ID: dummy
          AWS_SECRET_ACCESS_KEY: dummy
          AWS_S3_BUCKET_NAME: dummy
          AWS_S3_REGION: ap-northeast-1
        run: |
          java -jar build/libs/timeline-*.jar \
            --spring.flyway.target=8 \
            > /tmp/backend.log 2>&1 &

      - name: Start frontend
        working-directory: frontend
        run: pnpm dev &

      - name: Wait for backend
        run: |
          echo "Waiting for backend..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/actuator/health || echo "000")
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "401" ] || [ "$STATUS" = "403" ]; then
              echo "Backend is up (HTTP $STATUS)"
              exit 0
            fi
            sleep 3
          done
          echo "Backend did not start in time"
          cat /tmp/backend.log || true
          exit 1

      - name: Wait for frontend
        run: |
          echo "Waiting for frontend..."
          for i in $(seq 1 30); do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:5173 | grep -q "200"; then
              echo "Frontend is up"
              exit 0
            fi
            sleep 2
          done
          echo "Frontend did not start in time"
          exit 1

      - name: Run E2E tests
        working-directory: e2e
        run: pnpm exec playwright test scenarios/ --project=chromium

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            e2e/results/report/
            e2e/results/results.json
          retention-days: 14
