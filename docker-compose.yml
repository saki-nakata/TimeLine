services:
  db:
    image: postgres:18
    container_name: timeline-db
    environment:
      POSTGRES_DB: timeline
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d timeline"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
