spring:
  main:
    lazy-initialization: false
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:timeline}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:timeline}
    user: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: ${JWT_SECRET:change-this-secret-in-production-must-be-at-least-32-chars}
  expiration-seconds: 900
  refresh-expiration-seconds: 604800

server:
  port: 8080

logging:
  level:
    com.timeline: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  # Datadog 連携時は build.gradle に micrometer-registry-datadog を追加し、以下を有効化する
  # metrics:
  #   export:
  #     datadog:
  #       enabled: true
  #       api-key: ${DATADOG_API_KEY}

aws:
  s3:
    bucket-name: ${AWS_S3_BUCKET_NAME:saki-timeline-images}
    region: ${AWS_S3_REGION:ap-northeast-1}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs
  paths-to-match: /api/**
